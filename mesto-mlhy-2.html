<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Město mlhy</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1610;--paper:#f0e8d8;--aged:#c8b896;--aged2:#a89878;--amber:#c8841a;--green2:#3a7a3a;--red2:#c03030}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--paper);font-family:'Courier Prime','Courier New',monospace;min-height:100vh;overflow-x:hidden}
.rain{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.drop{position:absolute;top:-20px;width:1px;background:linear-gradient(transparent,rgba(180,160,120,.12));animation:fall linear infinite}
@keyframes fall{to{transform:translateY(110vh)}}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.wrap{max-width:680px;margin:0 auto;padding:0 20px;position:relative;z-index:2}

/* screens */
.scr{display:none}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.scr.on{display:block;animation:fu .4s ease both}

/* TITLE */
#s-title{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;position:relative;z-index:2}
#s-title.on{display:flex}
.eyebrow{font-size:.65rem;letter-spacing:.4em;color:var(--aged2);text-transform:uppercase;margin-bottom:28px}
.big-t{font-family:'Special Elite',serif;font-size:clamp(3rem,9vw,5.5rem);line-height:.95;text-shadow:4px 4px 0 #2a1f10;margin-bottom:10px;animation:flicker 9s ease 4s infinite}
@keyframes flicker{0%,91%,95%,100%{opacity:1}92%,94%{opacity:.25}93%{opacity:1}}
.big-sub{font-size:1rem;color:var(--aged);font-style:italic;margin-bottom:40px}
.div-line{width:100px;height:1px;background:var(--aged2);margin:0 auto 40px}
.intro-p{max-width:440px;color:var(--aged);font-size:.85rem;line-height:1.9;margin-bottom:44px;font-style:italic}
.btn-main{font-family:'Special Elite',serif;font-size:1rem;background:none;border:2px solid var(--aged2);color:var(--paper);padding:14px 48px;cursor:pointer;letter-spacing:.15em;text-transform:uppercase;transition:all .3s;position:relative;overflow:hidden;z-index:0}
.btn-main::before{content:'';position:absolute;inset:0;background:var(--aged2);transform:translateX(-100%);transition:.3s;z-index:-1}
.btn-main:hover{color:var(--ink)}.btn-main:hover::before{transform:translateX(0)}
.pips{display:flex;gap:8px;margin-top:48px;justify-content:center}
.pip{width:9px;height:9px;border:1px solid var(--aged2);border-radius:50%;transition:.3s}
.pip.on{background:var(--amber);border-color:var(--amber)}

/* BOARD */
#s-board{padding:48px 0 80px}
.board-h{font-family:'Special Elite',serif;font-size:2.2rem;text-align:center;margin-bottom:6px}
.board-sub{text-align:center;color:var(--aged);font-style:italic;margin-bottom:32px}
.rep-box{background:rgba(200,184,150,.05);border:1px solid rgba(200,184,150,.15);padding:16px 20px;margin-bottom:28px}
.rep-lbl{font-size:.6rem;letter-spacing:.25em;color:var(--aged2);text-transform:uppercase;margin-bottom:12px}
.rep-row{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.rep-nm{font-size:.78rem;color:var(--aged);width:90px;flex-shrink:0}
.rep-tr{flex:1;height:3px;background:rgba(200,184,150,.15)}
.rep-fi{height:100%;background:var(--amber);transition:width .6s}
.rep-vl{font-size:.7rem;color:var(--amber);width:28px;text-align:right;flex-shrink:0}
.card{display:flex;align-items:center;gap:14px;border:1px solid rgba(200,184,150,.18);padding:14px 18px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative}
.card:hover{border-color:var(--aged2);background:rgba(200,184,150,.04)}
.card.done{border-color:rgba(42,90,42,.4);background:rgba(42,90,42,.04)}
.card.locked{opacity:.3;cursor:default;pointer-events:none}
.cnum{font-family:'Special Elite',serif;font-size:1.7rem;color:var(--aged2);width:36px;text-align:center;flex-shrink:0}
.card.done .cnum{color:var(--green2)}
.cbody{flex:1}
.cstat{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:3px}
.card:not(.done):not(.locked) .cstat{color:var(--amber)}
.card.done .cstat{color:var(--green2)}.card.locked .cstat{color:var(--aged2)}
.ctit{font-family:'Special Elite',serif;font-size:1rem}
.cdesc{font-size:.75rem;color:var(--aged2);font-style:italic;margin-top:2px}

/* CASE */
#s-case{padding:40px 0 80px}
.back-btn{background:none;border:none;color:var(--aged2);cursor:pointer;font-family:'Courier Prime',monospace;font-size:.82rem;padding:0;margin-bottom:24px;letter-spacing:.05em}
.back-btn:hover{color:var(--paper)}
.stamp{display:inline-block;border:3px solid var(--red2);color:var(--red2);font-size:.68rem;letter-spacing:.3em;padding:3px 10px;transform:rotate(-2deg);font-weight:700;margin-bottom:14px}
.stamp.cl{border-color:var(--green2);color:var(--green2)}
.cnum2{font-size:.62rem;color:var(--aged2);letter-spacing:.3em;text-transform:uppercase}
.case-h{font-family:'Special Elite',serif;font-size:clamp(1.5rem,4vw,2.2rem);margin:6px 0 3px;line-height:1.1}
.case-sub{color:var(--aged);font-style:italic;font-size:.88rem;margin-bottom:24px}
.scene{background:rgba(240,232,216,.05);border:1px solid rgba(200,184,150,.18);border-left:3px solid var(--amber);padding:20px 24px;margin-bottom:20px;position:relative}
.scene::before{content:attr(data-loc);position:absolute;top:-10px;left:16px;background:var(--ink);padding:0 8px;font-size:.58rem;letter-spacing:.25em;color:var(--amber);text-transform:uppercase}
.scene-txt{font-size:.88rem;line-height:2;color:var(--aged)}
.chal{background:rgba(200,132,26,.06);border:1px solid rgba(200,132,26,.2);padding:12px 16px;margin-bottom:24px;font-size:.78rem;color:var(--amber);font-style:italic}
.ch-h{font-size:.62rem;letter-spacing:.3em;color:var(--aged2);text-transform:uppercase;margin-bottom:12px}
.choice{display:block;width:100%;text-align:left;background:none;border:1px solid rgba(200,184,150,.18);color:var(--aged);font-family:'Courier Prime',monospace;font-size:.85rem;padding:13px 16px;margin-bottom:8px;cursor:pointer;transition:all .2s;line-height:1.5}
.choice:not(:disabled):hover{border-color:var(--aged2);color:var(--paper);background:rgba(200,184,150,.05);padding-left:22px}
.choice.sg{border-color:var(--green2);color:var(--paper);background:rgba(42,90,42,.12)}
.choice.so{border-color:var(--amber);color:var(--paper);background:rgba(200,132,26,.1)}
.choice.sb{border-color:var(--red2);color:var(--paper);background:rgba(139,32,32,.1)}
.oc{border:1px solid;padding:18px 22px;margin:16px 0;animation:fu .4s ease}
.oc.good{border-color:var(--green2);background:rgba(42,90,42,.1)}
.oc.ok{border-color:var(--amber);background:rgba(200,132,26,.08)}
.oc.bad{border-color:var(--red2);background:rgba(139,32,32,.1)}
.oc-lbl{font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;margin-bottom:8px}
.oc.good .oc-lbl{color:var(--green2)}.oc.ok .oc-lbl{color:var(--amber)}.oc.bad .oc-lbl{color:var(--red2)}
.oc-txt{font-size:.85rem;line-height:1.9;color:var(--aged)}
.oc-ins{margin-top:12px;padding-top:12px;border-top:1px solid rgba(200,184,150,.18);font-size:.8rem;color:var(--paper);font-style:italic;line-height:1.7}
.div2{border:none;border-top:1px solid rgba(200,184,150,.18);margin:20px 0}
.inp-lbl{font-size:.62rem;letter-spacing:.28em;color:var(--aged2);text-transform:uppercase;margin-bottom:8px}
.inp-p{font-size:.78rem;color:var(--aged2);font-style:italic;margin-bottom:10px}
textarea{width:100%;background:rgba(240,232,216,.04);border:1px solid rgba(200,184,150,.22);border-bottom:2px solid var(--aged2);color:var(--paper);font-family:'Courier Prime',monospace;font-size:.88rem;line-height:1.8;padding:13px 15px;resize:vertical;min-height:90px;transition:border-color .2s}
textarea:focus{outline:none;border-color:var(--aged)}
textarea::placeholder{color:var(--aged2);font-style:italic}
.btn-go{font-family:'Courier Prime',monospace;font-size:.85rem;background:none;border:1px solid var(--aged2);color:var(--paper);padding:11px 30px;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;transition:all .25s;margin-top:12px}
.btn-go:hover{background:var(--aged2);color:var(--ink)}
.btn-go:disabled{opacity:.3;cursor:default}
.btn-am{border-color:var(--amber);color:var(--amber)}
.btn-am:hover{background:var(--amber);color:var(--ink)}

/* DEBRIEF */
#s-debrief{padding:40px 0 80px}
.db-stamp{display:inline-block;border:3px solid var(--green2);color:var(--green2);font-family:'Special Elite',serif;font-size:1.6rem;letter-spacing:.15em;padding:5px 14px;transform:rotate(-1deg);margin-bottom:14px}
.db-h{font-family:'Special Elite',serif;font-size:1.9rem;margin-bottom:4px}
.db-sub{color:var(--aged);font-style:italic;margin-bottom:32px}
.sc-row{display:flex;justify-content:space-around;border:1px solid rgba(200,184,150,.18);padding:18px;margin-bottom:20px}
.sc-item{text-align:center}
.sc-big{font-family:'Special Elite',serif;font-size:2.2rem}
.sc-big.good{color:var(--green2)}.sc-big.ok{color:var(--amber)}.sc-big.bad{color:var(--red2)}
.sc-sm{font-size:.58rem;color:var(--aged2);letter-spacing:.18em;text-transform:uppercase}
.db-sec{border:1px solid rgba(200,184,150,.18);padding:18px 22px;margin-bottom:14px}
.db-sl{font-size:.58rem;letter-spacing:.28em;color:var(--amber);text-transform:uppercase;margin-bottom:10px}
.db-tx{font-size:.85rem;line-height:1.9;color:var(--aged)}
.db-pr{font-size:.88rem;color:var(--paper);font-style:italic;border-left:2px solid var(--amber);padding-left:13px;margin-top:10px;line-height:1.7}
.btn-row{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap}
</style>
</head>

    d.style.height = (40+Math.random()*70)+"px";
    d.style.animationDuration = (.6+Math.random()*1.1)+"s";
    d.style.animationDelay   = (-Math.random()*2)+"s";
    r.appendChild(d);
  }
}

// ── title ─────────────────────────────────────────────────────
function showTitle(){
  var p = document.getElementById("pips");
  p.innerHTML = "";
  CASES.forEach(function(c){
    var d = document.createElement("div");
    d.className = "pip" + (S.done[c.id] ? " on" : "");
    p.appendChild(d);
  });
  goTo("s-title");
}

// ── board ─────────────────────────────────────────────────────
function showBoard(){
  var rh = '<div class="rep-lbl">Tvoje reputace</div>';
  REP.forEach(function(r){
    var v = Math.min(100,(S.rep[r]||0)*20);
    rh += '<div class="rep-row">';
    rh += '<span class="rep-nm">'+r.charAt(0).toUpperCase()+r.slice(1)+'</span>';
    rh += '<div class="rep-tr"><div class="rep-fi" style="width:'+v+'%"></div></div>';
    rh += '<span class="rep-vl">'+(S.rep[r]||0)+'/5</span>';
    rh += '</div>';
  });
  document.getElementById("rep-box").innerHTML = rh;

  var ch = "";
  CASES.forEach(function(c,i){
    var done  = !!S.done[c.id];
    var avail = i===0 || !!S.done[CASES[i-1].id];
    var locked = !avail;
    var qual  = done ? S.done[c.id].quality : null;
    var sc    = qual==="good" ? '<span style="color:var(--green2)">●●●</span>'
              : qual==="ok"   ? '<span style="color:var(--amber)">●●○</span>'
              : qual==="bad"  ? '<span style="color:var(--red2)">●○○</span>' : "";
    var cls = "card"+(done?" done":"")+(locked?" locked":"");
    ch += '<div class="'+cls+'"'+(avail?' onclick="openCase('+c.id+')"':'')+' style="cursor:'+(avail?'pointer':'default')+'">';
    ch += '<div class="cnum">'+(done?"✓":c.id)+'</div>';
    ch += '<div class="cbody">';
    ch += '<div class="cstat">'+(done?"UZAVŘEN":locked?"ZAMČEN":"OTEVŘEN")+'</div>';
    ch += '<div class="ctit">'+c.title+'</div>';
    ch += '<div class="cdesc">'+c.tagline+'</div>';
    ch += '</div>';
    if(sc) ch += '<div style="font-size:.8rem;flex-shrink:0">'+sc+'</div>';
    ch += '</div>';
  });
  document.getElementById("cards").innerHTML = ch;
  goTo("s-board");
}

// ── case ─────────────────────────────────────────────────────
function openCase(id){
  curId    = id;
  var sv   = S.done[id];
  curStage = sv ? "done" : "choice";
  curPick  = sv ? sv.choiceIdx : null;
  noteVal  = "";
  renderCase();
  goTo("s-case");
}

function renderCase(){
  var c  = null;
  for(var i=0;i<CASES.length;i++){ if(CASES[i].id===curId){ c=CASES[i]; break; } }
  if(!c) return;
  var sv = S.done[curId];
  var h  = "";

  h += '<div class="stamp'+(sv?" cl":"")+'">'+( sv ? "UZAVŘEN" : "AKTIVNÍ PŘÍPAD")+'</div>';
  h += '<div class="cnum2">Případ č.0'+c.id+' &middot; '+c.skill+'</div>';
  h += '<h2 class="case-h">'+c.title+'</h2>';
  h += '<div class="case-sub">'+c.tagline+'</div>';

  var ihtml = c.intro.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
  h += '<div class="scene" data-loc="'+c.loc+'"><div class="scene-txt">'+ihtml+'</div></div>';
  h += '<div class="chal">&#9889; '+c.challenge+'</div>';
  h += '<div class="ch-h">Jak reaguješ?</div>';

  if(curStage==="choice"){
    for(var i=0;i<c.choices.length;i++){
      var ch = c.choices[i];
      var L  = ["A","B","C"][i];
      h += '<button class="choice" onclick="pick('+i+')"><strong>'+L+'.</strong> '+ch.t+'</button>';
    }
  }

  if(curStage==="outcome" && curPick!==null){
    var chosen = c.choices[curPick];
    for(var i=0;i<c.choices.length;i++){
      var ch2 = c.choices[i];
      var L2  = ["A","B","C"][i];
      var sel = (i===curPick) ? ' class="choice sel-'+chosen.q+'" disabled' : ' class="choice" disabled style="opacity:.3"';
      h += '<button'+sel+'><strong>'+L2+'.</strong> '+ch2.t+'</button>';
    }
    var ql = chosen.q==="good"?"SKVĚLÝ VÝSLEDEK":chosen.q==="ok"?"PŘIJATELNÝ VÝSLEDEK":"SLOŽITÝ TAH";
    h += '<div class="oc '+chosen.q+'">';
    h += '<div class="oc-lbl">'+ql+'</div>';
    h += '<div class="oc-txt">'+chosen.o+'</div>';
    h += '<div class="oc-ins">&#128206; '+chosen.i+'</div>';
    h += '</div>';
    h += '<hr class="div2">';
    h += '<div class="inp-lbl">Zápisník detektiva</div>';
    h += '<div class="inp-p">'+c.inputPrompt+'</div>';
    h += '<textarea id="note-ta" placeholder="'+c.inputPh+'" rows="5"></textarea>';
    h += '<br><button class="btn-go" id="note-btn" disabled onclick="submitCase()">Uzavřít případ &#8594;</button>';
  }

  if(curStage==="done" && sv){
    var sch = c.choices[sv.choiceIdx];
    for(var i=0;i<c.choices.length;i++){
      var ch3 = c.choices[i];
      var L3  = ["A","B","C"][i];
      var sel2 = (i===sv.choiceIdx) ? ' class="choice sel-'+sv.quality+'" disabled' : ' class="choice" disabled style="opacity:.3"';
      h += '<button'+sel2+'><strong>'+L3+'.</strong> '+ch3.t+'</button>';
    }
    var ql2 = sch.q==="good"?"SKVĚLÝ VÝSLEDEK":sch.q==="ok"?"PŘIJATELNÝ VÝSLEDEK":"SLOŽITÝ TAH";
    h += '<div class="oc '+sv.quality+'">';
    h += '<div class="oc-lbl">'+ql2+'</div>';
    h += '<div class="oc-txt">'+sch.o+'</div>';
    h += '<div class="oc-ins">&#128206; '+sch.i+'</div>';
    h += '</div>';
    if(sv.note) h += '<div style="margin-top:14px;border:1px solid rgba(200,184,150,.15);padding:14px;font-size:.82rem;color:var(--aged);font-style:italic;line-height:1.8;">"'+sv.note+'"</div>';
    h += '<div style="margin-top:18px"><button class="btn-go" onclick="showBoard()">&#8592; Nástěnka</button></div>';
  }

  document.getElementById("case-body").innerHTML = h;

  var ta = document.getElementById("note-ta");
  if(ta){
    ta.addEventListener("input", function(){
      noteVal = this.value;
      var btn = document.getElementById("note-btn");
      if(btn) btn.disabled = !noteVal.trim();
    });
  }
}

function pick(idx){
  curPick  = idx;
  curStage = "outcome";
  renderCase();
}

function submitCase(){
  if(!noteVal.trim()) return;
  var c = null;
  for(var i=0;i<CASES.length;i++){ if(CASES[i].id===curId){ c=CASES[i]; break; } }
  var ch = c.choices[curPick];
  S.done[curId] = {choiceIdx:curPick, quality:ch.q, note:noteVal.trim()};
  var gain = ch.q==="good"?2:ch.q==="ok"?1:0;
  S.rep[c.rep] = Math.min(5,(S.rep[c.rep]||0)+gain);
  save();
  renderDebrief();
  goTo("s-debrief");
}

// ── debrief ──────────────────────────────────────────────────
function renderDebrief(){
  var c = null;
  for(var i=0;i<CASES.length;i++){ if(CASES[i].id===curId){ c=CASES[i]; break; } }
  var sv  = S.done[curId];
  var ch  = c.choices[sv.choiceIdx];
  var gd=0,ok=0,bd=0;
  Object.keys(S.done).forEach(function(k){
    var q = S.done[k].quality;
    if(q==="good") gd++; else if(q==="ok") ok++; else bd++;
  });
  var sc  = ch.q==="good"?"●●●":ch.q==="ok"?"●●○":"●○○";
  var stc = ch.q==="good"?"var(--green2)":ch.q==="ok"?"var(--amber)":"var(--red2)";
  var stt = ch.q==="good"?"PŘÍPAD VYŘEŠEN":ch.q==="ok"?"PŘÍPAD UZAVŘEN":"PŘÍPAD PŘEŽIT";
  var nxt = curId+1;
  var hasN = nxt<=10 && !S.done[nxt];

  var h = "";
  h += '<div style="text-align:center;margin-bottom:28px">';
  h += '<div class="db-stamp" style="border-color:'+stc+';color:'+stc+'">'+stt+'</div>';
  h += '<h2 class="db-h">'+c.title+'</h2>';
  h += '<p class="db-sub">'+c.tagline+'</p>';
  h += '</div>';
  h += '<div class="sc-row">';
  h += '<div class="sc-item"><div class="sc-big '+ch.q+'">'+sc+'</div><div class="sc-sm">Tento případ</div></div>';
  h += '<div class="sc-item"><div class="sc-big good">'+gd+'</div><div class="sc-sm">Brilantních</div></div>';
  h += '<div class="sc-item"><div class="sc-big ok">'+ok+'</div><div class="sc-sm">Solidních</div></div>';
  h += '<div class="sc-item"><div class="sc-big bad">'+bd+'</div><div class="sc-sm">Složitých</div></div>';
  h += '</div>';
  h += '<div class="db-sec"><div class="db-sl">Co se ukázalo</div><div class="db-tx">'+c.lesson+'</div><div class="db-pr">'+c.principle+'</div></div>';
  h += '<div class="db-sec"><div class="db-sl">Jeden krok do praxe</div><div class="db-tx">'+c.apply+'</div></div>';
  if(sv.note) h += '<div class="db-sec"><div class="db-sl">Tvůj zápisník</div><div class="db-tx" style="font-style:italic;color:var(--paper)">"'+sv.note+'"</div></div>';
  h += '<div class="btn-row">';
  h += '<button class="btn-go" onclick="showBoard()">Zpět na nástěnku</button>';
  if(hasN) h += '<button class="btn-go btn-am" onclick="openCase('+nxt+')">Další případ &#8594;</button>';
  h += '</div>';

  document.getElementById("deb-body").innerHTML = h;
}

// ── wire static buttons ───────────────────────────────────────
document.getElementById("btn-open").addEventListener("click", showBoard);
document.getElementById("btn-back-title").addEventListener("click", showTitle);
document.getElementById("btn-back-board").addEventListener("click", showBoard);

// ── init ─────────────────────────────────────────────────────
load();
mkRain();
showTitle();
</script>
</body>
</html>
