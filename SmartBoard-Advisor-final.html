<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartBoard Advisor</title>
<style>
:root{
  --bg:#f4f6f8;
  --card:#ffffff;
  --line:#dfe5eb;
  --text:#18212b;
  --muted:#64707d;
  --brand:#2e7d32;
  --brand-soft:#e8f5e9;
  --ok:#1b5e20;
  --warn:#b26a00;
}
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;background:linear-gradient(180deg,#eef3f8 0%,#f7f8fa 100%);margin:0;color:var(--text)}
.wrapper{max-width:1180px;margin:0 auto;padding:24px}
.header{margin-bottom:18px}
.header h1{margin:0 0 6px;font-size:32px}
.header p{margin:0;color:var(--muted);font-size:15px}
.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;align-items:start}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 24px rgba(18,38,63,.06);padding:20px}
.section-title{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 12px;font-weight:700}
.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.tab-btn{padding:12px 16px;border:none;border-radius:12px;background:#edf1f5;color:var(--text);cursor:pointer;font-weight:700}
.tab-btn.active{background:var(--brand);color:#fff}
.form-grid{display:grid;gap:14px}
.field-row{display:flex;gap:12px;flex-wrap:wrap;align-items:end}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;color:var(--muted);font-weight:700}
input,select{padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text);min-width:130px}
input.small{width:110px;min-width:110px}
input.wide{width:180px}
.helper{font-size:12px;color:var(--muted)}
.wall-list{display:flex;flex-direction:column;gap:10px}
.wall-item{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fbfcfe}
.wall-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.wall-name{font-weight:700}
.ghost-btn,.danger-btn,.primary-btn{padding:11px 14px;border:none;border-radius:12px;cursor:pointer;font-weight:700}
.ghost-btn{background:#edf1f5;color:var(--text)}
.danger-btn{background:#fff1f1;color:#ab2c2c}
.primary-btn{background:var(--brand);color:#fff}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.dashboard{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:8px}
.metric{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:14px}
.metric .label{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.metric .value{font-size:28px;font-weight:800}
.metric .sub{font-size:13px;color:var(--muted);margin-top:6px}
.big-decision{padding:16px;border-radius:18px;background:var(--brand-soft);border:1px solid #c8e6c9;margin-bottom:12px}
.big-decision .eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;color:var(--brand);margin-bottom:8px}
.big-decision .material{font-size:38px;font-weight:900;line-height:1;margin-bottom:8px}
.big-decision .reason{font-size:15px;line-height:1.45}
.logic-box{border:1px solid var(--line);border-radius:16px;padding:16px;background:#fcfdff;margin-top:12px}
.logic-box h3{margin:0 0 10px;font-size:18px}
.logic-list{margin:0;padding-left:18px;color:var(--text)}
.logic-list li{margin:8px 0;line-height:1.45}
.summary{margin-top:12px;padding:14px;border-radius:14px;background:#f8fafc;border:1px solid var(--line);font-size:14px;line-height:1.55}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800}
.badge.ok{background:#e8f6ed;color:var(--ok)}
.badge.warn{background:#fff3e3;color:var(--warn)}
.product-list{display:grid;gap:10px;margin-top:12px}
.product{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}
.compare-table{display:grid;gap:10px;margin-top:12px}
.compare-row{display:grid;grid-template-columns:1.2fr .8fr .7fr .7fr .8fr;gap:10px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}
.compare-row.header{background:#f3f7f3;font-weight:800}
.compare-best{border:2px solid var(--brand);background:#f4fbf4}
.compare-cell small{display:block;color:var(--muted);font-size:12px;margin-top:2px}
.purchase-box{margin-top:12px;padding:14px;border-radius:14px;background:#f8fafc;border:1px solid var(--line)}
.purchase-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.product strong{display:block;margin-bottom:4px}
.product span{font-size:13px;color:var(--muted)}
.material-switch{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.switch-btn{padding:10px 14px;border:1px solid var(--line);border-radius:12px;background:#fff;cursor:pointer;font-weight:700}
.switch-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.switch-note{font-size:12px;color:var(--muted);margin-top:8px}
@media (max-width: 920px){
  .grid{grid-template-columns:1fr}
  .dashboard{grid-template-columns:1fr 1fr}
}
@media (max-width: 620px){
  .dashboard{grid-template-columns:1fr}
  .field-row{flex-direction:column;align-items:stretch}
  input,select{width:100%;min-width:0}
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>SmartBoard Advisor</h1>
    <p>Demo konfigurátor pro rychlé doporučení desek JSD / HSD místo OSB podle použití, rozměrů a zatížení.</p>
  </div>

  <div class="grid">
    <div class="card">
      <div class="section-title">Zadání projektu</div>
      <div class="tabs">
        <button id="tab-wall" class="tab-btn active" onclick="setType('wall')">Dřevostavba</button>
        <button id="tab-floor" class="tab-btn" onclick="setType('floor')">Podlaha</button>
        <button id="tab-box" class="tab-btn" onclick="setType('box')">Obal</button>
      </div>

      <div class="form-grid">
        <div class="field-row">
          <div class="field">
            <label for="load">Zatížení / náročnost</label>
            <select id="load">
              <option value="standard">Standardní</option>
              <option value="higher">Vyšší</option>
              <option value="high">Vysoké</option>
            </select>
          </div>
          <div class="field">
            <label for="environment">Prostředí</label>
            <select id="environment">
              <option value="dry">Suché</option>
              <option value="humid">Vlhčí provoz</option>
            </select>
          </div>
          <div class="field">
            <label for="reserve">Rezerva materiálu</label>
            <select id="reserve">
              <option value="8">8 %</option>
              <option value="10" selected>10 %</option>
              <option value="12">12 %</option>
              <option value="15">15 %</option>
            </select>
          </div>
        </div>

        <div id="inputs"></div>
      </div>

      <div class="actions">
        <button class="primary-btn" onclick="calculate()">Spočítat doporučení</button>
        <button class="ghost-btn" onclick="resetCurrentType()">Resetovat vstupy</button>
        <button class="ghost-btn" onclick="exportShoppingList()">Export TXT</button>
        <button class="ghost-btn" onclick="exportShoppingListCSV()">Export CSV</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Dashboard rozhodnutí</div>
      <div id="result"></div>
    </div>
  </div>
</div>

<script>
let type = 'wall';
let lastCalculation = null;
let materialOverride = { wall: null, box: null };

const boardFormats = {
  JSD: [
    { code:'JSD P5 2500 × 1250', width:2500, height:1250, price:690 },
    { code:'JSD P5 2800 × 2070', width:2800, height:2070, price:1290 },
    { code:'JSD P5 1800 × 900', width:1800, height:900, price:390 }
  ],
  HSD: [
    { code:'HSD P7 2500 × 1250', width:2500, height:1250, price:950 },
    { code:'HSD P7 2840 × 1830', width:2840, height:1830, price:1520 },
    { code:'HSD P7 1800 × 900', width:1800, height:900, price:590 }
  ]
};

let walls = [
  { name: 'Stěna 1', w: 4000, h: 2600 },
  { name: 'Stěna 2', w: 3500, h: 2600 }
];

function setType(t){
  type = t;
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(`tab-${t}`).classList.add('active');
  render();
  calculate();
}

function render(){
  const el = document.getElementById('inputs');
  el.innerHTML = '';

  if(type === 'wall'){
    let html = `
      <div class="field">
        <label>Jednotlivé stěny v mm</label>
        <div class="helper">Zadávej šířku a výšku každé stěny samostatně. Výpočet se sčítá do celkové plochy.</div>
      </div>
      <div class="wall-list">
    `;

    walls.forEach((wall, i) => {
      html += `
        <div class="wall-item">
          <div class="wall-top">
            <div class="wall-name">${wall.name}</div>
            ${walls.length > 1 ? `<button class="danger-btn" onclick="removeWall(${i})">Odstranit</button>` : ''}
          </div>
          <div class="field-row">
            <div class="field">
              <label>Název</label>
              <input class="wide" type="text" value="${wall.name}" oninput="walls[${i}].name=this.value">
            </div>
            <div class="field">
              <label>Šířka (mm)</label>
              <input class="small" type="number" step="1" min="1" value="${wall.w}" oninput="walls[${i}].w=parseFloat(this.value)||0">
            </div>
            <div class="field">
              <label>Výška (mm)</label>
              <input class="small" type="number" step="1" min="1" value="${wall.h}" oninput="walls[${i}].h=parseFloat(this.value)||0">
            </div>
          </div>
        </div>
      `;
    });

    html += `</div><button class="ghost-btn" onclick="addWall()">+ Přidat další stěnu</button>`;
    el.innerHTML = html;
  }

  if(type === 'floor'){
    el.innerHTML = `
      <div class="field-row">
        <div class="field">
          <label for="floorArea">Výměra podlahy (m²)</label>
          <input id="floorArea" type="number" step="0.1" min="0" value="42">
        </div>
        <div class="field">
          <label for="floorUse">Typ použití</label>
          <select id="floorUse">
            <option value="standard">Běžná podlaha</option>
            <option value="higher">Vyšší provoz</option>
          </select>
        </div>
      </div>
      <div class="helper">Pro podlahy je jako primární doporučení nastavená JSD. HSD se ukáže jako alternativa pro náročnější aplikace.</div>
    `;
  }

  if(type === 'box'){
    el.innerHTML = `
      <div class="field-row">
        <div class="field">
          <label for="boxL">Délka obalu (mm)</label>
          <input id="boxL" type="number" step="1" min="1" value="1200">
        </div>
        <div class="field">
          <label for="boxW">Šířka obalu (mm)</label>
          <input id="boxW" type="number" step="1" min="1" value="800">
        </div>
        <div class="field">
          <label for="boxH">Výška obalu (mm)</label>
          <input id="boxH" type="number" step="1" min="1" value="900">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="boxCount">Počet kusů</label>
          <input id="boxCount" type="number" step="1" min="1" value="10">
        </div>
        <div class="field">
          <label for="boxType">Typ obalu</label>
          <select id="boxType">
            <option value="closed">Uzavřený obal</option>
            <option value="open">Otevřený obal bez víka</option>
          </select>
        </div>
      </div>
      <div class="helper">Výpočet pracuje s pláštěm obalu. U otevřeného obalu se nepočítá horní stěna.</div>
    `;
  }
}

function addWall(){
  walls.push({ name: `Stěna ${walls.length + 1}`, w: 3000, h: 2600 });
  render();
}

function removeWall(index){
  walls.splice(index, 1);
  render();
  calculate();
}

function resetCurrentType(){
  if(type === 'wall'){
    walls = [
      { name: 'Stěna 1', w: 4000, h: 2600 },
      { name: 'Stěna 2', w: 3500, h: 2600 }
    ];
  }
  if(type === 'wall' || type === 'box'){
    materialOverride[type] = null;
  }
  render();
  calculate();
}

function getProjectData(){
  let baseArea = 0;
  let detail = '';
  let parts = [];
  const reservePct = Number(document.getElementById('reserve').value || 10);
  const load = document.getElementById('load').value;
  const environment = document.getElementById('environment').value;

  if(type === 'wall'){
    const wallAreas = walls.map(w => ({
      name: w.name || 'Stěna',
      w: Number(w.w) || 0,
      h: Number(w.h) || 0,
      area: ((Number(w.w) || 0) / 1000) * ((Number(w.h) || 0) / 1000)
    }));
    baseArea = wallAreas.reduce((sum, item) => sum + item.area, 0);
    detail = wallAreas.map(item => `${item.name}: ${item.area.toFixed(2)} m²`).join('<br>');
    parts = wallAreas
      .filter(item => item.w > 0 && item.h > 0)
      .map(item => ({ name:item.name, width:item.w, height:item.h, qty:1 }));
  }

  if(type === 'floor'){
    baseArea = Number(document.getElementById('floorArea')?.value || 0);
    const floorUse = document.getElementById('floorUse')?.value || 'standard';
    detail = `Výměra podlahy: ${baseArea.toFixed(2)} m²` + (floorUse === 'higher' ? '<br>Režim: vyšší provoz' : '<br>Režim: běžná podlaha');
    parts = [{ name:'Podlahová plocha', area:baseArea }];
  }

  if(type === 'box'){
    const l = Number(document.getElementById('boxL')?.value || 0);
    const w = Number(document.getElementById('boxW')?.value || 0);
    const h = Number(document.getElementById('boxH')?.value || 0);
    const count = Number(document.getElementById('boxCount')?.value || 0);
    const boxType = document.getElementById('boxType')?.value || 'closed';

    const lm = l / 1000;
    const wm = w / 1000;
    const hm = h / 1000;
    const unitArea = boxType === 'open'
      ? (2 * (lm * hm) + 2 * (wm * hm) + (lm * wm))
      : (2 * (lm * wm + lm * hm + wm * hm));

    baseArea = unitArea * count;
    detail = `Rozměr obalu: ${l.toFixed(0)} × ${w.toFixed(0)} × ${h.toFixed(0)} mm<br>${boxType === 'open' ? 'Typ: otevřený obal' : 'Typ: uzavřený obal'}<br>Počet kusů: ${count}`;
    parts = [
      { name:'Dno / víko', width:l, height:w, qty: boxType === 'open' ? count : count * 2 },
      { name:'Bočnice delší', width:l, height:h, qty: count * 2 },
      { name:'Bočnice kratší', width:w, height:h, qty: count * 2 }
    ].filter(item => item.qty > 0 && item.width > 0 && item.height > 0);
  }

  const totalArea = baseArea * (1 + reservePct / 100);
  return { baseArea, totalArea, reservePct, load, environment, detail, parts };
}

function decideMaterial(data){
  let material = 'JSD';
  let reason = 'Univerzální a ekonomická volba pro dané použití.';
  let alternative = 'HSD jako pevnější varianta pro vyšší nároky.';
  let badgeClass = 'ok';
  let badgeText = 'Doporučeno';

  if(type === 'floor'){
    material = 'JSD';
    reason = 'Pro podlahy je JSD plně dostačující a dává nejlepší poměr výkon / cena.';
    alternative = 'HSD pro specifické aplikace s vyšším mechanickým namáháním.';
    if(document.getElementById('floorUse')?.value === 'higher' || data.load === 'high'){
      badgeClass = 'warn';
      badgeText = 'Zvážit HSD alternativu';
    }
  }

  if(type === 'wall'){
    if(data.load === 'high' || data.environment === 'humid' || data.baseArea > 80){
      material = 'HSD';
      reason = 'Pro větší nebo náročnější konstrukci dává HSD vyšší rezervu pevnosti a stability.';
      alternative = 'JSD jako levnější varianta pro méně náročné řešení.';
      badgeClass = 'warn';
      badgeText = 'Vyšší náročnost';
    } else {
      material = 'JSD';
      reason = 'Pro standardní konstrukční použití je JSD vhodná a ekonomická náhrada OSB.';
      alternative = 'HSD při požadavku na vyšší pevnostní rezervu.';
    }
  }

  if(type === 'box'){
    if(data.load === 'high' || data.totalArea > 60 || data.environment === 'humid'){
      material = 'HSD';
      reason = 'Pro robustnější obaly a vyšší mechanické namáhání je vhodnější HSD.';
      alternative = 'JSD pro standardní, cenově úsporné obalové řešení.';
      badgeClass = 'warn';
      badgeText = 'Náročnější obal';
    } else {
      material = 'JSD';
      reason = 'Pro běžný obalový materiál je JSD efektivní a ekonomické řešení.';
      alternative = 'HSD pro vyšší odolnost a opakované použití.';
    }
  }

  return { material, reason, alternative, badgeClass, badgeText };
}

function getProducts(material){
  if(material === 'HSD'){
    return [
      { name: 'HSD P7 25 × 2500 × 1250', note: 'Pevnější varianta pro náročnější použití' },
      { name: 'HSD P7 22 × 2840 × 1830', note: 'Větší formát pro lepší využití plochy' }
    ];
  }
  return [
    { name: 'JSD P5 22 × 2500 × 1250', note: 'Univerzální volba pro stavby, podlahy a obaly' },
    { name: 'JSD P5 18 × 2800 × 2070', note: 'Větší formát pro nižší prořez u větších ploch' }
  ];
}

function getFormatComparisons(material, data){
  return boardFormats[material].map(format => {
    const boardArea = (format.width / 1000) * (format.height / 1000);
    let boards = Math.ceil(data.totalArea / boardArea);
    let wastePct = Math.max(0, ((boards * boardArea - data.totalArea) / (boards * boardArea)) * 100);

    if(type === 'wall' || type === 'box'){
      const pieceResult = estimatePartsOnBoards(data.parts, format);
      boards = pieceResult.boards;
      wastePct = pieceResult.wastePct;
    }

    return {
      ...format,
      boardArea,
      boards,
      wastePct,
      totalPrice: boards * format.price
    };
  }).sort((a,b) => a.wastePct - b.wastePct || a.totalPrice - b.totalPrice);
}

function estimatePartsOnBoards(parts, format){
  if(!parts || !parts.length) return { boards:0, wastePct:0 };
  const sheets = [];
  let totalPieceArea = 0;
  const fW = format.width;
  const fH = format.height;

  const expanded = [];
  parts.forEach(part => {
    const qty = part.qty || 1;
    for(let i=0;i<qty;i++) expanded.push({ width:part.width, height:part.height });
  });

  expanded.sort((a,b) => Math.max(b.height,b.width) - Math.max(a.height,a.width));

  for(const part of expanded){
    totalPieceArea += (part.width/1000) * (part.height/1000);
    let placed = false;

    for(const sheet of sheets){
      if(placeInSheet(sheet, part, fW, fH)){
        placed = true;
        break;
      }
    }

    if(!placed){
      const newSheet = { rows: [] };
      placeInSheet(newSheet, part, fW, fH);
      sheets.push(newSheet);
    }
  }

  const boards = sheets.length;
  const totalBoardArea = boards * ((fW/1000) * (fH/1000));
  const wastePct = totalBoardArea > 0 ? Math.max(0, ((totalBoardArea - totalPieceArea) / totalBoardArea) * 100) : 0;
  return { boards, wastePct };
}

function placeInSheet(sheet, part, fW, fH){
  const options = [
    { width: part.width, height: part.height },
    { width: part.height, height: part.width }
  ];

  for(const option of options){
    if(option.width > fW || option.height > fH) continue;

    for(const row of sheet.rows){
      if(option.height <= row.height && row.usedWidth + option.width <= fW){
        row.usedWidth += option.width;
        return true;
      }
    }

    const usedHeight = sheet.rows.reduce((sum, row) => sum + row.height, 0);
    if(usedHeight + option.height <= fH){
      sheet.rows.push({ height: option.height, usedWidth: option.width });
      return true;
    }
  }

  return false;
}

function renderComparisonTable(comparisons){
  if(!comparisons.length) return '';
  return `
    <div class="logic-box">
      <h3>Porovnání formátů podle prořezu</h3>
      <div class="compare-table">
        <div class="compare-row header">
          <div class="compare-cell">Formát</div>
          <div class="compare-cell">Plocha / ks</div>
          <div class="compare-cell">Ks desek</div>
          <div class="compare-cell">Prořez</div>
          <div class="compare-cell">Cena</div>
        </div>
        ${comparisons.map((item, index) => `
          <div class="compare-row ${index === 0 ? 'compare-best' : ''}">
            <div class="compare-cell"><strong>${item.code}</strong>${index === 0 ? '<small>Nejefektivnější varianta</small>' : ''}</div>
            <div class="compare-cell">${item.boardArea.toFixed(2)} m²</div>
            <div class="compare-cell">${item.boards}</div>
            <div class="compare-cell">${item.wastePct.toFixed(1)} %</div>
            <div class="compare-cell">${item.totalPrice.toLocaleString('cs-CZ')} Kč</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function setMaterialOverride(material){
  if(type === 'wall' || type === 'box'){
    materialOverride[type] = material;
    calculate();
  }
}

function clearMaterialOverride(){
  if(type === 'wall' || type === 'box'){
    materialOverride[type] = null;
    calculate();
  }
}

function renderMaterialSwitch(recommendedMaterial, activeMaterial){
  if(type !== 'wall' && type !== 'box') return '';
  return `
    <div class="logic-box">
      <h3>Volba materiálu</h3>
      <div><strong>Doporučená varianta:</strong> ${recommendedMaterial}</div>
      <div class="material-switch">
        <button class="switch-btn ${activeMaterial === 'JSD' ? 'active' : ''}" onclick="setMaterialOverride('JSD')">Použít JSD</button>
        <button class="switch-btn ${activeMaterial === 'HSD' ? 'active' : ''}" onclick="setMaterialOverride('HSD')">Použít HSD</button>
        <button class="switch-btn ${materialOverride[type] === null ? 'active' : ''}" onclick="clearMaterialOverride()">Vrátit doporučení</button>
      </div>
      <div class="switch-note">Můžeš ponechat doporučenou variantu, nebo si ručně přepnout výpočet na druhý materiál.</div>
    </div>
  `;
}

function renderPurchaseList(best, material){
  if(!best) return '';
  return `
    <div class="purchase-box">
      <strong>Nákupní seznam</strong><br>
      Doporučený formát: <strong>${best.code}</strong><br>
      Počet desek: <strong>${best.boards} ks</strong><br>
      Odhad ceny: <strong>${best.totalPrice.toLocaleString('cs-CZ')} Kč</strong><br>
      Materiál: <strong>${material}</strong>
      <div class="purchase-actions">
        <button class="primary-btn" onclick="exportShoppingList()">Exportovat TXT</button>
        <button class="ghost-btn" onclick="exportShoppingListCSV()">Exportovat CSV</button>
        <button class="ghost-btn" onclick="createOrderDraft()">Vytvořit objednávku</button>
      </div>
    </div>
  `;
}

function calculate(){
  const data = getProjectData();
  const decision = decideMaterial(data);
  const recommendedMaterial = decision.material;
  const activeMaterial = (type === 'wall' || type === 'box') && materialOverride[type]
    ? materialOverride[type]
    : recommendedMaterial;

  const products = getProducts(activeMaterial);
  const comparisons = getFormatComparisons(activeMaterial, data);
  const bestFormat = comparisons[0] || null;
  const boards = bestFormat ? bestFormat.boards : 0;
  const price = bestFormat ? bestFormat.totalPrice : 0;

  lastCalculation = { type, data, decision, comparisons, bestFormat, activeMaterial, recommendedMaterial };

  document.getElementById('result').innerHTML = `
    <div class="big-decision">
      <div class="eyebrow">Doporučený materiál</div>
      <div class="material">${activeMaterial}</div>
      <div class="reason">${decision.reason}</div>
      <div style="margin-top:10px"><span class="badge ${decision.badgeClass}">${decision.badgeText}</span></div>
    </div>

    <div class="dashboard">
      <div class="metric">
        <div class="label">Čistá plocha</div>
        <div class="value">${data.baseArea.toFixed(2)}</div>
        <div class="sub">m² bez rezervy</div>
      </div>
      <div class="metric">
        <div class="label">Plocha s rezervou</div>
        <div class="value">${data.totalArea.toFixed(2)}</div>
        <div class="sub">m² včetně ${data.reservePct}% rezervy</div>
      </div>
      <div class="metric">
        <div class="label">Počet desek</div>
        <div class="value">${boards}</div>
        <div class="sub">nejvýhodnější formát: ${bestFormat ? bestFormat.code : '—'}</div>
      </div>
      <div class="metric">
        <div class="label">Odhad ceny</div>
        <div class="value">${price.toLocaleString('cs-CZ')}</div>
        <div class="sub">Kč orientačně pro demo</div>
      </div>
    </div>

    <div class="logic-box">
      <h3>Rozhodovací logika</h3>
      <ul class="logic-list">
        <li><strong>Typ použití:</strong> ${type === 'wall' ? 'dřevostavba' : type === 'floor' ? 'podlaha' : 'obalový materiál'}</li>
        <li><strong>Doporučená varianta:</strong> ${recommendedMaterial}</li>
        <li><strong>Aktuálně počítaná varianta:</strong> ${activeMaterial}</li>
        <li><strong>Alternativa:</strong> ${decision.alternative}</li>
        <li><strong>Posouzení:</strong> zatížení = ${translateLoad(data.load)}, prostředí = ${translateEnvironment(data.environment)}</li>
      </ul>
    </div>

    <div class="summary">
      <strong>Souhrn výpočtu</strong><br>
      ${data.detail}
    </div>

    <div class="logic-box">
      <h3>Ukázkové produkty</h3>
      <div class="product-list">
        ${products.map(p => `<div class="product"><strong>${p.name}</strong><span>${p.note}</span></div>`).join('')}
      </div>
    </div>

    ${renderMaterialSwitch(recommendedMaterial, activeMaterial)}
    ${renderComparisonTable(comparisons)}
    ${renderPurchaseList(bestFormat, activeMaterial)}
  `;
}

function translateLoad(load){
  if(load === 'higher') return 'vyšší';
  if(load === 'high') return 'vysoké';
  return 'standardní';
}

function translateEnvironment(env){
  return env === 'humid' ? 'vlhčí provoz' : 'suché';
}

function stripHtmlBreaks(text){
  return String(text || '').replace(/<br\s*\/?>/gi, '\n');
}

function downloadFile(content, filename, mimeType){
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function exportShoppingList(){
  if(!lastCalculation || !lastCalculation.bestFormat){
    alert('Nejdřív proveď výpočet.');
    return;
  }

  const { decision, bestFormat, data, activeMaterial } = lastCalculation;
  const lines = [
    'SMARTBOARD ADVISOR – NÁKUPNÍ SEZNAM',
    '===================================',
    `Použití: ${type === 'wall' ? 'Dřevostavba' : type === 'floor' ? 'Podlaha' : 'Obalový materiál'}`,
    `Doporučený materiál: ${decision.material}`,
    `Počítaný materiál: ${activeMaterial}`,
    `Doporučený formát: ${bestFormat.code}`,
    `Počet desek: ${bestFormat.boards} ks`,
    `Odhad ceny: ${bestFormat.totalPrice.toLocaleString('cs-CZ')} Kč`,
    `Čistá plocha: ${data.baseArea.toFixed(2)} m²`,
    `Plocha s rezervou: ${data.totalArea.toFixed(2)} m²`,
    '',
    'Souhrn výpočtu:',
    stripHtmlBreaks(data.detail)
  ];

  downloadFile(lines.join('\n'), 'nakupni-seznam-smartboard.txt', 'text/plain;charset=utf-8');
}

function exportShoppingListCSV(){
  if(!lastCalculation || !lastCalculation.bestFormat){
    alert('Nejdřív proveď výpočet.');
    return;
  }

  const { decision, bestFormat, data, activeMaterial } = lastCalculation;
  const rows = [
    ['Položka','Hodnota'],
    ['Použití', type === 'wall' ? 'Dřevostavba' : type === 'floor' ? 'Podlaha' : 'Obalový materiál'],
    ['Doporučený materiál', decision.material],
    ['Počítaný materiál', activeMaterial],
    ['Doporučený formát', bestFormat.code],
    ['Počet desek', String(bestFormat.boards)],
    ['Odhad ceny Kč', String(bestFormat.totalPrice)],
    ['Čistá plocha m2', data.baseArea.toFixed(2)],
    ['Plocha s rezervou m2', data.totalArea.toFixed(2)],
    ['Souhrn výpočtu', stripHtmlBreaks(data.detail).replace(/\n/g, ' | ')]
  ];

  const csv = rows
    .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(';'))
    .join('\n');

  downloadFile(csv, 'nakupni-seznam-smartboard.csv', 'text/csv;charset=utf-8');
}

function createOrderDraft(){
  if(!lastCalculation || !lastCalculation.bestFormat){
    alert('Nejdřív proveď výpočet.');
    return;
  }

  const query = lastCalculation.activeMaterial === 'HSD' ? 'HSD' : 'JSD';
  window.open(`https://www.kili.cz/hledat?q=${encodeURIComponent(query)}`, '_blank');
}

render();
calculate();
</script>
</body>
</html>
